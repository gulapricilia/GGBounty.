syntax = "proto3";
package types;
option go_package = "github.com/canopy-network/go-plugin/contract";

import "google/protobuf/any.proto";
// Transaction represents a request or action submitted to the network like transfer assets or perform other operations
// within the blockchain system - THIS MUST MATCH lib.Transaction EXACTLY for signing
message Transaction {
  // message_type: The type of the transaction like 'send' or 'stake'
  string message_type = 1; // @gotags: json:"messageType"
  // msg: The actual transaction message payload, which is encapsulated in a generic message format
  google.protobuf.Any msg = 2;
  // signature: The cryptographic signature used to verify the authenticity of the transaction
  Signature signature = 3;
  // created_height: The height when the transaction was created - allows 'safe pruning'
  uint64 created_height = 4; // @gotags: json:"createdHeight"
  // time: The timestamp when the transaction was created - used as temporal entropy to prevent hash collisions in txs
  uint64 time = 5;
  // fee: The fee associated with processing the transaction
  uint64 fee = 6;
  // memo: An optional message or note attached to the transaction
  string memo = 7;
  // network_id: The identity of the network the transaction is intended for
  uint64 network_id = 8; // @gotags: json:"networkID"
  // chain_id: The identity of the committee the transaction is intended for
  uint64 chain_id = 9; // @gotags: json:"chainID"
  // NOTE: CAN EXTEND FUNCTIONALITY BY ADDING ADDITIONAL FIELDS
  // NO CONFLICT STARTING AT FIELD = 10
}

// MessageSend is a standard transfer transaction, taking tokens from the sender and transferring
// them to the recipient
message MessageSend {
  // from_address: is the sender of the funds
  bytes from_address = 1; // @gotags: json:"fromAddress"
  // to_address: is the recipient of the funds
  bytes to_address = 2; // @gotags: json:"toAddress"
  // amount: is the amount of tokens in micro-denomination (uCNPY)
  uint64 amount = 3;
}

// FeeParams is the parameter space that defines various amounts for transaction fees
message FeeParams {
  // send_fee: is the fee amount (in uCNPY) for Message Send
  uint64 send_fee = 1; // @gotags: json:"sendFee"
  // NO CONFLICT STARTING AT FIELD = 14
}

// A Signature is a digital signature is a cryptographic "fingerprint" created with a private key,
// allowing others to verify the authenticity and integrity of a message using the corresponding public key
message Signature {
  // public_key: is a cryptographic code shared openly, used to verify digital signatures
  bytes public_key = 1; // @gotags: json:"publicKey"
  // signature: the bytes of the signature output from a private key which may be verified with the message and public
  bytes signature = 2;
}

// MessageCreateBounty creates a new bounty. The reward is escrowed immediately: on success,
// `reward` uCNPY is moved out of the signer's balance and held at a deterministic escrow
// address until a winner is selected (see DeliverMessageCreateBounty / SelectWinner - a later
// feature). This atomically prevents a creator from posting a bounty they can't actually pay out.
message MessageCreateBounty {
  // signer_address: the bounty creator (must sign the transaction, must hold >= reward balance)
  bytes signer_address = 1; // @gotags: json:"signerAddress"
  // title: a short bounty title (1-100 characters)
  string title = 2;
  // description: the full bounty description (1-2000 characters)
  string description = 3;
  // reward: the amount (uCNPY) escrowed for the winner, must be > 0
  uint64 reward = 4;
  // deadline: unix time (seconds) after which the bounty can no longer accept submissions;
  // must be strictly after the transaction's own timestamp
  uint64 deadline = 5;
}

// Bounty is the GG Bounty state record for a bounty, keyed by its deterministic id
// (see KeyForBounty). status: 0 = Open, 1 = Completed (a winner was selected via SelectWinner -
// a later feature). "Expired" (deadline passed with no winner selected) is intentionally NOT a
// separate stored status in this feature - it's derived by comparing `deadline` against the
// current time when read, since a passed deadline is true regardless of whether any transaction
// has "noticed" yet. Refunding an expired, unclaimed bounty's escrow is not yet implemented -
// this is a known gap, not a silent mock.
message Bounty {
  // id: the 20-byte deterministic bounty id
  bytes id = 1;
  // creator: the address that created (and funded) this bounty
  bytes creator = 2;
  // title: the bounty title
  string title = 3;
  // description: the full bounty description
  string description = 4;
  // reward: the escrowed amount (uCNPY) - held at the deterministic escrow address for this id
  uint64 reward = 5;
  // deadline: unix time (seconds) after which no new submissions/joins are accepted
  uint64 deadline = 6;
  // status: 0 = Open, 1 = Completed
  uint32 status = 7;
  // participant_count: number of addresses that have joined (JoinBounty - a later feature)
  uint64 participant_count = 8; // @gotags: json:"participantCount"
  // submission_count: number of submissions received (SubmitWork - a later feature)
  uint64 submission_count = 9; // @gotags: json:"submissionCount"
  // winner: set by SelectWinner (a later feature); empty (0 bytes) until then
  bytes winner = 10;
  // created_at: unix time (seconds) this bounty was created, derived from the creating tx's time
  uint64 created_at = 11; // @gotags: json:"createdAt"
}
// MessageJoinBounty registers the signer as a participant on an Open, non-expired bounty.
// Joining is required before SubmitWork will accept a submission from that address.
message MessageJoinBounty {
  // signer_address: the participant joining
  bytes signer_address = 1; // @gotags: json:"signerAddress"
  // bounty_id: the 20-byte id of the bounty to join
  bytes bounty_id = 2; // @gotags: json:"bountyId"
}

// Participant is the GG Bounty state record proving an address joined a bounty, keyed by
// (bounty_id, address) - see KeyForParticipant. Its mere existence is the join proof; SubmitWork
// checks for this record before accepting a submission.
message Participant {
  bytes bounty_id = 1; // @gotags: json:"bountyId"
  bytes address = 2;
  // joined_at: unix time (seconds), derived from the joining tx's own time (deterministic)
  uint64 joined_at = 3; // @gotags: json:"joinedAt"
}

// MessageSubmitWork submits (or updates - resubmitting overwrites) completed work for a bounty
// the signer has already joined.
message MessageSubmitWork {
  // signer_address: the submitter (must have an existing Participant record for this bounty)
  bytes signer_address = 1; // @gotags: json:"signerAddress"
  // bounty_id: the 20-byte id of the bounty being submitted to
  bytes bounty_id = 2; // @gotags: json:"bountyId"
  // description: what was done / how to evaluate it (1-2000 characters)
  string description = 3;
  // repo_url: link to the code (required, 1-512 characters)
  string repo_url = 4; // @gotags: json:"repoUrl"
  // demo_url: optional link to a live demo/video (0-512 characters)
  string demo_url = 5; // @gotags: json:"demoUrl"
}

// Submission is the GG Bounty state record for a piece of submitted work, keyed by
// (bounty_id, submitter) - see KeyForSubmission. One submission per address per bounty;
// resubmitting overwrites the previous one (does not increment Bounty.submission_count again).
message Submission {
  bytes bounty_id = 1; // @gotags: json:"bountyId"
  bytes submitter = 2;
  string description = 3;
  string repo_url = 4; // @gotags: json:"repoUrl"
  string demo_url = 5; // @gotags: json:"demoUrl"
  // submitted_at: unix time (seconds) of the first submission (unchanged by resubmission)
  uint64 submitted_at = 6; // @gotags: json:"submittedAt"
  // updated_at: unix time (seconds) of the most recent (re)submission
  uint64 updated_at = 7; // @gotags: json:"updatedAt"
}

// MessageSelectWinner is called by a bounty's creator to choose a winner from among the
// addresses that submitted work. This single transaction atomically: marks the bounty Completed,
// releases the escrowed reward from the deterministic escrow pseudo-account directly to the
// winner's real account balance, and updates the winner's Profile (completedBounties,
// totalRewardsEarned, reputation). There is deliberately NO separate, independently-callable
// TransferReward transaction - see DeliverMessageSelectWinner's docblock for why.
message MessageSelectWinner {
  // signer_address: must equal the bounty's creator (checked statefully in DeliverTx, since
  // CheckTx in this template is stateless - see CheckMessageSelectWinner's comment)
  bytes signer_address = 1; // @gotags: json:"signerAddress"
  // bounty_id: the 20-byte id of the bounty
  bytes bounty_id = 2; // @gotags: json:"bountyId"
  // winner_address: must have an existing Submission record for this bounty
  bytes winner_address = 3; // @gotags: json:"winnerAddress"
}
// MessageCreateProfile creates (or updates) the GG Bounty profile owned by the signer.
// The profile is keyed by the signer's address, so resubmitting this message overwrites the
// editable fields (username, avatarUrl, bio) while DeliverMessageCreateProfile preserves the
// system-tracked fields (reputation, totalRewardsEarned, completedBounties, createdBounties),
// which only change as a side effect of other GG Bounty transactions.
message MessageCreateProfile {
  // signer_address: the address that owns this profile (must sign the transaction)
  bytes signer_address = 1; // @gotags: json:"signerAddress"
  // username: a display name for the profile (1-32 characters)
  string username = 2;
  // avatar_url: an optional URL pointing to a profile image (0-512 characters)
  string avatar_url = 3; // @gotags: json:"avatarUrl"
  // bio: an optional short biography (0-280 characters)
  string bio = 4;
}

// Profile is the GG Bounty state record for a user profile, keyed by address (see KeyForProfile).
// Fields below the divider are system-tracked: they are never set directly by MessageCreateProfile,
// only ever updated as a side effect of other GG Bounty transactions (e.g. SelectWinner, CreateBounty).
message Profile {
  // address: the 20-byte address that owns this profile (also the record's key)
  bytes address = 1;
  // username: the profile's display name
  string username = 2;
  // avatar_url: an optional URL pointing to a profile image
  string avatar_url = 3; // @gotags: json:"avatarUrl"
  // bio: an optional short biography
  string bio = 4;
  // --- system-tracked fields below; not set by MessageCreateProfile ---
  // reputation: a score reflecting the trustworthiness/history of this profile
  uint64 reputation = 5;
  // total_rewards_earned: cumulative CNPY (uCNPY) earned from won bounties
  uint64 total_rewards_earned = 6; // @gotags: json:"totalRewardsEarned"
  // completed_bounties: count of bounties this profile has won
  uint64 completed_bounties = 7; // @gotags: json:"completedBounties"
  // created_bounties: count of bounties this profile has created
  uint64 created_bounties = 8; // @gotags: json:"createdBounties"
  // created_at: unix time (seconds) this profile was first created
  uint64 created_at = 9; // @gotags: json:"createdAt"
  // updated_at: unix time (seconds) this profile was last updated
  uint64 updated_at = 10; // @gotags: json:"updatedAt"
}
